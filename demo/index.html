<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Font4Social Unicode Widgets Demo</title>
  <link rel="stylesheet" href="../dist/font4social-widgets.css">
  <style>
    body {
      margin: 0;
      padding: 32px;
      background: #f5f7ff;
      color: #121522;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(100%, 860px);
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(34px, 7vw, 72px);
      line-height: 0.95;
    }

    .intro {
      max-width: 680px;
      margin-bottom: 28px;
      color: #586070;
      font-size: 18px;
      line-height: 1.55;
    }
  </style>
</head>
<body>
  <main>
    <h1>Font4Social Unicode Widgets</h1>
    <p class="intro">Tiny copy-paste widgets you can embed anywhere. For the full generator, emoji library, invisible text tool, and QR tools, visit <a href="https://font4social.com/">Font4Social</a>.</p>

    <div data-f4s-widget="fancy-text" data-text="Creator Style"></div>

    <div data-f4s-widget="blank-text"></div>

    <div data-f4s-widget="emoji-strip" data-emojis="😂,❤️,🔥,✨,✅,🎮,🚀,💯,👑,⚡"></div>
  </main>

  <script src="../dist/font4social-widgets.js"></script>
</body>
</html>
